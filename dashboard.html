<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔝 NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
    <a class="navbar-brand" href="#">MyApp</a>

    <div class="ms-auto">
        <a href="index.html" class="btn btn-outline-light">
            <i class="bi bi-box-arrow-right"></i> Logout
        </a>
    </div>
</nav>

<!-- 📦 MAIN CONTENT -->
<div class="container mt-5">

    <!-- Welcome -->
    <div class="text-center mb-4">
        <h2>Welcome, User 👋</h2>
        <p class="text-muted">You have successfully logged in.</p>
    </div>

    <!-- Cards Section -->
    <div class="row g-4">

        <!-- Card 1 -->
        <div class="col-md-4">
            <div class="card p-3 shadow text-center">
                <i class="bi bi-person fs-1 text-primary"></i>
                <h5 class="mt-3">Profile</h5>
                <p class="text-muted">View and edit your profile</p>
                <button class="btn btn-primary w-100">Go</button>
            </div>
        </div>

        <!-- Card 2 -->
        <div class="col-md-4">
            <div class="card p-3 shadow text-center">
                <i class="bi bi-gear fs-1 text-primary"></i>
                <h5 class="mt-3">Settings</h5>
                <p class="text-muted">Manage your account settings</p>
                <button class="btn btn-primary w-100">Go</button>
            </div>
        </div>

        <!-- Card 3 -->
        <div class="col-md-4">
            <div class="card p-3 shadow text-center">
                <i class="bi bi-bell fs-1 text-primary"></i>
                <h5 class="mt-3">Notifications</h5>
                <p class="text-muted">Check your notifications</p>
                <button class="btn btn-primary w-100">Go</button>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
