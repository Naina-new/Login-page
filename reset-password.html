<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

    <div class="card p-4 shadow" style="max-width: 400px; width: 100%;">

        <h2 class="text-center mb-4">Reset Password</h2>

        <form action="index.html">

            <!-- New Password -->
            <div class="mb-3">
                <label class="form-label">New Password</label>
                <div class="input-group">
                    <input type="password" id="newPassword" class="form-control" placeholder="Enter new password" required>
                    <span class="input-group-text" onclick="togglePassword('newPassword', this)">
                        <i class="bi bi-eye"></i>
                    </span>
                </div>
            </div>

            <!-- Confirm Password -->
            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <div class="input-group">
                    <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm password" required>
                    <span class="input-group-text" onclick="togglePassword('confirmPassword', this)">
                        <i class="bi bi-eye"></i>
                    </span>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Update Password
            </button>

        </form>

    </div>

<!-- JS for toggle -->
<script>
function togglePassword(id, icon) {
    const input = document.getElementById(id);
    const iconTag = icon.querySelector("i");

    if (input.type === "password") {
        input.type = "text";
        iconTag.classList.remove("bi-eye");
        iconTag.classList.add("bi-eye-slash");
    } else {
        input.type = "password";
        iconTag.classList.remove("bi-eye-slash");
        iconTag.classList.add("bi-eye");
    }
}
document.querySelector("form").addEventListener("submit", function(e) {
    const pass1 = document.getElementById("newPassword").value;
    const pass2 = document.getElementById("confirmPassword").value;

    if (pass1 !== pass2) {
        alert("Passwords do not match!");
        e.preventDefault();
    }
});
</script>

</body>
</html>
